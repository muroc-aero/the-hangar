# CI for the open packages.
#
# Layout:
#   fast-tests    every PR/push: pinned upstreams + all package tests
#                 excluding slow/golden (-m "not slow")
#   docker-build  every PR/push: builds one image to keep Dockerfiles honest
#   nightly       schedule/manual: full suite including slow and golden
#                 tiers, plus the per-example parity suites
#
# Deliberately excluded:
#   - packages/range-safety: private submodule, tested in its own repo.
#     checkout runs WITHOUT submodules so the open-only path is what CI
#     exercises (dev-setup.sh then syncs only the open packages).
#   - upstream/ clones come from scripts/setup-upstream.sh --required at
#     the refs pinned in scripts/upstream-pins.env (invoked by dev-setup.sh)
#     and are cached on the pins file.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * *" # nightly, 08:17 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Single-threaded BLAS for deterministic numerics (required by the
  # golden tiers, harmless for the rest)
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"

jobs:
  fast-tests:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache upstream clones
        uses: actions/cache@v4
        with:
          path: upstream
          key: upstream-${{ hashFiles('scripts/upstream-pins.env', 'scripts/pycycle-numpy2.patch') }}

      - name: Set up environment
        run: bash scripts/dev-setup.sh --pypi

      - name: Run fast tests
        run: uv run pytest -m "not slow" -q

  docker-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build oas server image
        run: docker build -f packages/oas/Dockerfile .

  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Cache upstream clones
        uses: actions/cache@v4
        with:
          path: upstream
          key: upstream-${{ hashFiles('scripts/upstream-pins.env', 'scripts/pycycle-numpy2.patch') }}

      - name: Set up environment
        run: bash scripts/dev-setup.sh --pypi

      - name: Full suite (slow + golden tiers included)
        run: uv run pytest -q

      - name: Example parity suites
        # Run one directory at a time: each example sets up its own
        # sys.path (colliding `shared` modules), so they cannot share a
        # pytest invocation.
        run: |
          for d in packages/*/examples/*/tests packages/omd/examples/tests; do
            [ -d "$d" ] || continue
            echo "::group::$d"
            uv run pytest "$d" -q
            echo "::endgroup::"
          done
