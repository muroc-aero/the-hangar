services:
  oas:
    build:
      context: ..
      dockerfile: packages/oas/Dockerfile
    ports:
      - "8000:8000"
      - "7654:7654"   # Provenance viewer / dashboard
    volumes:
      # Bind-mount host directory for persistent artifact storage.
      # Docker creates the directory automatically if it doesn't exist.
      - ./hangar_data/oas:/data
    # Load secrets from a local .env next to this file (optional). The
    # deployment .env template lives in the private lakesideai-infra repo,
    # not here.
    env_file:
      - path: .env
        required: false
    environment:
      # Docker-specific overrides — always use HTTP, bind to all interfaces,
      # and store artifacts in the bind-mounted host directory.
      OAS_TRANSPORT: http
      OAS_HOST: 0.0.0.0
      HANGAR_DATA_DIR: /data
      # Store provenance DB in the bind-mounted volume so it survives restarts.
      HANGAR_PROV_DB: /data/provenance.db

  ocp:
    build:
      context: ..
      dockerfile: packages/ocp/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./hangar_data/ocp:/data
    env_file:
      - path: .env
        required: false
    environment:
      OCP_TRANSPORT: http
      OCP_HOST: 0.0.0.0
      # In-container port must match the container side of the ports mapping
      # (the server's native default is 8001).
      OCP_PORT: 8000
      HANGAR_DATA_DIR: /data
      HANGAR_PROV_DB: /data/provenance.db

  pyc:
    build:
      context: ..
      dockerfile: packages/pyc/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./hangar_data/pyc:/data
    env_file:
      - path: .env
        required: false
    environment:
      PYC_TRANSPORT: http
      PYC_HOST: 0.0.0.0
      # In-container port must match the container side of the ports mapping
      # (the server's native default is 8002).
      PYC_PORT: 8000
      HANGAR_DATA_DIR: /data
      HANGAR_PROV_DB: /data/provenance.db

  omd:
    build:
      context: ..
      dockerfile: packages/omd/Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ./hangar_data/omd:/data
    env_file:
      - path: .env
        required: false
    environment:
      OMD_TRANSPORT: http
      OMD_HOST: 0.0.0.0
      # In-container port must match the container side of the ports mapping
      # (the server's native default is 8003).
      OMD_PORT: 8000
      HANGAR_DATA_DIR: /data
      HANGAR_PROV_DB: /data/provenance.db
      # The dashboard runs as its own service in deployments; no in-container
      # autostart (hangar-range-safety is not installed in this image).
      RS_DASHBOARD_AUTOSTART: "off"

  evt:
    build:
      context: ..
      dockerfile: packages/evt/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./hangar_data/evt:/data
    env_file:
      - path: .env
        required: false
    environment:
      EVT_TRANSPORT: http
      EVT_HOST: 0.0.0.0
      # In-container port must match the container side of the ports mapping
      # (the server's native default is 8004).
      EVT_PORT: 8000
      HANGAR_DATA_DIR: /data
      HANGAR_PROV_DB: /data/provenance.db

  viewer:
    build:
      context: ..
      dockerfile: packages/viewer/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./hangar_data/oas:/data/oas:ro
      - ./hangar_data/ocp:/data/ocp:ro
      - ./hangar_data/pyc:/data/pyc:ro
      - ./hangar_data/omd:/data/omd:ro
      - ./hangar_data/evt:/data/evt:ro
    environment:
      HANGAR_VIEWER_DBS: "oas=/data/oas/provenance.db,ocp=/data/ocp/provenance.db,pyc=/data/pyc/provenance.db,omd=/data/omd/provenance.db,evt=/data/evt/provenance.db"
