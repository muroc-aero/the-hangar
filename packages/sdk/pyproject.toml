[project]
name = "hangar-sdk"
version = "0.1.0"
description = "Shared infrastructure for Hangar engineering MCP servers"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "pyyaml>=6.0",
]

[project.scripts]
hangar-study = "hangar.sdk.study.cli:main"

[project.optional-dependencies]
auth = ["PyJWT[crypto]>=2.8", "httpx>=0.27"]
viz  = ["matplotlib"]
http = ["uvicorn>=0.27", "itsdangerous>=2.1"]
all  = ["PyJWT[crypto]>=2.8", "httpx>=0.27", "matplotlib", "uvicorn>=0.27", "itsdangerous>=2.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hangar"]
