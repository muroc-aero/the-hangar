[project]
name = "hangar-sdk"
version = "0.1.0"
description = "Shared infrastructure for Hangar engineering MCP servers"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hangar"]
