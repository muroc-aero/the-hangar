[project]
name = "muroc-oas"
version = "0.1.0"
description = "OpenAeroStruct MCP server for agentic analysis"
requires-python = ">=3.11"
dependencies = [
    "muroc-sdk",
    # "openaerostruct>=2.8",
    "openmdao>=3.30",
    "numpy",
    "matplotlib",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/muroc_oas"]

[tool.uv.sources]
muroc-sdk = { workspace = true }
# For development: use local upstream clone
# Comment below and uncomment the openaerostruct dependency above for production
openaerostruct = { path = "../../upstream/OpenAeroStruct", editable = true }
