[project]
name = "hangar-viewer"
version = "0.1.0"
description = "Unified provenance viewer for Hangar MCP tool servers"
requires-python = ">=3.11"
dependencies = [
    "hangar-sdk[all]",
    "starlette>=0.36",
    "uvicorn>=0.27",
]

[project.scripts]
hangar-viewer = "hangar.viewer.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hangar"]
