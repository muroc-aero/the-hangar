[package]
name = "hangar_kernels"
version = "0.1.0"
edition = "2021"
description = "Native Rust hot kernels for hangar MDAO components (proof of concept)"
license = "MIT"

[lib]
name = "hangar_kernels"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"] }
numpy = "0.22"
ndarray = "0.16"
num-complex = "0.4"
rayon = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
