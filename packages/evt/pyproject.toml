[project]
name = "hangar-evt"
version = "0.1.0"
description = "evtolpy electric VTOL sizing and mission-energy MCP server for agentic analysis"
requires-python = ">=3.11"
dependencies = [
    "hangar-sdk[all]",
    "evtolpy",
    "numpy>=1.21",
    "matplotlib",
]

[project.scripts]
evt-server = "hangar.evt.server:main"
evt-cli    = "hangar.evt.cli:main"

[project.entry-points."hangar.study_runners"]
evt = "hangar.evt.study_runner"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hangar"]

[tool.uv.sources]
hangar-sdk = { workspace = true }
# For development: use local upstream clone (packaging patch adds pyproject)
evtolpy = { path = "../../upstream/evtolpy", editable = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "golden_physics: physics-invariant golden tests",
    "parity: parity tests vs direct evtolpy API",
]
