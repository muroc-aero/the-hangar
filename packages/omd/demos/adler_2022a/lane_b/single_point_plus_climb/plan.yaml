metadata:
  id: adler-single-point-plus-climb
  name: Adler 2022a single point + climb (B738 aerostruct wing)
  version: 1
  description: >
    Reproduces the modified objective from Adler & Martins (2022a)
    Section IV.A: Breguet for the cruise segment + Eq. 2 (modified
    Breguet with climb-angle term) for a single climb-segment
    aerostructural analysis. Same 14 wingbox DVs and same 2.5 g
    failure constraint as the other variants.

operating_points: {}

components:
- id: design
  type: oas/AerostructBreguet
  config:
    mode: cruise_plus_climb_breguet
    mission_range_nmi: 1500.0
    climb_range_nmi: 100.0
    MTOW_kg: 79002.0
    tsfc_g_per_kN_s: 17.76
    orig_W_wing_kg: 6561.57
    payload_kg: 17260.0
    flight_points:
    # Climb halfway: roughly 17,500 ft, M ~ 0.55, gamma 3 deg
    - {mach: 0.55, altitude_ft: 17500.0, weight_fraction: 0.25, gamma_deg: 3.0}
    # Cruise midpoint
    - {mach: 0.78, altitude_ft: 35000.0, weight_fraction: 0.5,  gamma_deg: 0.0}
    surface_grid:
      num_x: 3
      num_y: 7
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4
    maneuver:
      load_factor: 2.5
      mach: 0.78
      altitude_ft: 20000.0
      num_x: 3
      num_y: 7
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4

design_variables:
- {name: "ac|geom|wing|AR",              lower: 5.0,   upper: 10.4}
- {name: "ac|geom|wing|c4sweep",         lower: 0.0,   upper: 35.0,  units: "deg"}
- {name: "ac|geom|wing|taper",           lower: 0.01,  upper: 0.35,  scaler: 10.0}
- name: "ac|geom|wing|twist"
  lower: [0.0, -10.0, -10.0, -10.0]
  upper: [0.0, 10.0, 10.0, 10.0]
  units: "deg"
- name: "ac|geom|wing|toverc"
  lower: [0.030, 0.053, 0.077, 0.10]
  upper: 0.25
- {name: "ac|geom|wing|skin_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}
- {name: "ac|geom|wing|spar_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}

constraints:
- {name: "2_5g_KS_failure", upper: 0.0}

objective:
  name: fuel_burn_kg
  scaler: 1.0e-4

optimizer:
  type: SLSQP
  options:
    maxiter: 150
    tol: 1.0e-4
