metadata:
  id: adler-single-point-smoke
  name: Adler 2022a single-point Breguet (B738 aerostruct wing) - smoke mesh
  version: 1
  description: >
    Phase 2.1 smoke configuration of lane_b/single_point/plan.yaml. Reduced
    mesh (num_x=2, num_y=5) and 300 nmi mission range, intended to converge
    SLSQP in 30-60 min wall time on an 8-core box. Used to validate that
    Phase 1 plumbing produces the right qualitative match to paper Table 5
    single_point row before committing to the 4-12 h paper-spec run.

operating_points: {}

components:
- id: design
  type: oas/AerostructBreguet
  config:
    mode: single_cruise_breguet
    mission_range_nmi: 300.0
    MTOW_kg: 79002.0
    tsfc_g_per_kN_s: 17.76
    orig_W_wing_kg: 6561.57
    payload_kg: 17260.0
    flight_points:
    - mach: 0.78
      altitude_ft: 35000.0
      weight_fraction: 0.5
      gamma_deg: 0.0
    surface_grid:
      num_x: 2
      num_y: 5
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4
    maneuver:
      load_factor: 2.5
      mach: 0.78
      altitude_ft: 20000.0
      num_x: 2
      num_y: 5
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4

design_variables:
- {name: "ac|geom|wing|AR",              lower: 5.0,   upper: 10.4}
- {name: "ac|geom|wing|c4sweep",         lower: 0.0,   upper: 35.0,  units: "deg"}
- {name: "ac|geom|wing|taper",           lower: 0.01,  upper: 0.35,  scaler: 10.0}
- name: "ac|geom|wing|twist"
  lower: [0.0, -10.0, -10.0, -10.0]
  upper: [0.0, 10.0, 10.0, 10.0]
  units: "deg"
- name: "ac|geom|wing|toverc"
  lower: [0.030, 0.053, 0.077, 0.10]
  upper: 0.25
- {name: "ac|geom|wing|skin_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}
- {name: "ac|geom|wing|spar_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}

constraints:
- {name: "2_5g_KS_failure", upper: 0.0}

objective:
  name: fuel_burn_kg
  scaler: 1.0e-4

optimizer:
  type: SLSQP
  options:
    maxiter: 150
    tol: 1.0e-4
