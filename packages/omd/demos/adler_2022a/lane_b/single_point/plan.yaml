metadata:
  id: adler-single-point
  name: Adler 2022a single-point Breguet (B738 aerostruct wing)
  version: 1
  description: >
    Reproduces the single-point optimization method from Adler & Martins
    (2022a) Section IV / Table 3. Minimizes fuel burn computed via the
    Breguet range equation at one cruise condition (M=0.78, 35 kft,
    half-fuel weight) over 14 wingbox design variables, subject to a
    KS-aggregated stress failure constraint at a 2.5 g maneuver
    sizing condition (M=0.78, 20 kft, MTOW). TSFC fixed at 17.76
    g/(kN-sec) per paper Section IV. Mission range parameterised
    (1500 nmi default; sweep overrides).

operating_points: {}

components:
- id: design
  type: oas/AerostructBreguet
  config:
    mode: single_cruise_breguet
    mission_range_nmi: 1500.0
    MTOW_kg: 79002.0
    tsfc_g_per_kN_s: 17.76
    orig_W_wing_kg: 6561.57
    payload_kg: 17260.0
    flight_points:
    - mach: 0.78
      altitude_ft: 35000.0
      weight_fraction: 0.5
      gamma_deg: 0.0
    surface_grid:
      num_x: 3
      num_y: 7
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4
    maneuver:
      load_factor: 2.5
      mach: 0.78
      altitude_ft: 20000.0
      num_x: 3
      num_y: 7
      num_twist: 4
      num_toverc: 4
      num_skin: 4
      num_spar: 4

design_variables:
- {name: "ac|geom|wing|AR",              lower: 5.0,   upper: 10.4}
- {name: "ac|geom|wing|c4sweep",         lower: 0.0,   upper: 35.0,  units: "deg"}
- {name: "ac|geom|wing|taper",           lower: 0.01,  upper: 0.35,  scaler: 10.0}
- name: "ac|geom|wing|twist"
  lower: [0.0, -10.0, -10.0, -10.0]
  upper: [0.0, 10.0, 10.0, 10.0]
  units: "deg"
- name: "ac|geom|wing|toverc"
  lower: [0.030, 0.053, 0.077, 0.10]
  upper: 0.25
- {name: "ac|geom|wing|skin_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}
- {name: "ac|geom|wing|spar_thickness",  lower: 0.003, upper: 0.10,  units: "m", scaler: 100.0}

constraints:
- {name: "2_5g_KS_failure", upper: 0.0}

objective:
  name: fuel_burn_kg
  scaler: 1.0e-4

optimizer:
  type: SLSQP
  options:
    maxiter: 150
    tol: 1.0e-4
