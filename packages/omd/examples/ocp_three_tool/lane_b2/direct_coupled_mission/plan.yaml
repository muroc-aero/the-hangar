metadata:
  id: ocp-three-tool-direct-mission
  name: B738 mission with direct-coupled OAS drag and pyCycle HBTF propulsion
  version: 2
  description: >
    B738 basic mission with both slots filled using direct-coupled
    providers: OAS VLM-direct drag and pyCycle HBTF propulsion.
    Both run their full solvers at every Newton iteration, providing
    exact results and analytic partials at higher computational cost.

components:
- id: mission
  type: ocp/BasicMission
  config:
    aircraft_template: b738
    architecture: twin_turbofan
    num_nodes: 3
    mission_params:
      cruise_altitude_ft: 35000
      mission_range_NM: 1500
      climb_vs_ftmin: 2000
      climb_Ueas_kn: 250
      cruise_Ueas_kn: 460
      descent_vs_ftmin: 1500
      descent_Ueas_kn: 250
    slots:
      drag:
        provider: oas/vlm-direct
        config:
          num_x: 2
          num_y: 5
          num_twist: 4
      propulsion:
        provider: pyc/hbtf
        config:
          design_alt: 35000
          design_MN: 0.8
          design_Fn: 5900
          design_T4: 2857
          thermo_method: TABULAR

operating_points: {}
