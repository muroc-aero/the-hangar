metadata:
  id: ocp-three-tool-mission
  name: B738 mission with OAS drag and pyCycle HBTF propulsion
  version: 2
  description: >
    B738 basic mission with both slots filled: OAS VLM surrogate
    drag replacing PolarDrag, and pyCycle HBTF surrogate propulsion
    replacing the default CFM56. Uses NLBGS solver to avoid the
    ill-conditioned Jacobian from dual-surrogate coupling.

components:
- id: mission
  type: ocp/BasicMission
  config:
    aircraft_template: b738
    architecture: twin_turbofan
    num_nodes: 3
    solver_settings:
      solver_type: nlbgs
      maxiter: 200
      atol: 1e-8
      rtol: 1e-8
    mission_params:
      cruise_altitude_ft: 35000
      mission_range_NM: 1500
      climb_vs_ftmin: 2000
      climb_Ueas_kn: 250
      cruise_Ueas_kn: 460
      descent_vs_ftmin: 1500
      descent_Ueas_kn: 250
    slots:
      drag:
        provider: oas/vlm
        config:
          num_x: 2
          num_y: 7
          num_twist: 4
      propulsion:
        provider: pyc/surrogate
        config:
          archetype: hbtf
          design_alt: 35000
          design_MN: 0.8
          design_Fn: 5900
          design_T4: 2857
          engine_params:
            thermo_method: TABULAR

operating_points: {}
