metadata:
  id: ex-ocp-caravan-full
  name: Caravan full mission (balanced-field takeoff + climb/cruise/descent)
  version: 1
  description: >
    Cessna 208 Caravan single-turboprop full mission with balanced-field
    takeoff phases plus climb/cruise/descent, matching the Lane A
    reference script. Newton/Direct solver.

operating_points: {}

components:
- id: caravan-mission
  type: ocp/FullMission
  config:
    aircraft_template: caravan
    architecture: turboprop
    num_nodes: 11
    solver_settings:
      solver_type: newton
      maxiter: 20
      atol: 1.0e-10
      rtol: 1.0e-10
    mission_params:
      cruise_altitude_ft: 18000.0
      mission_range_NM: 250.0
      climb_vs_ftmin: 850.0
      climb_Ueas_kn: 104.0
      cruise_Ueas_kn: 129.0
      descent_vs_ftmin: 400.0
      descent_Ueas_kn: 100.0
